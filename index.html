<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Checkmate-hubb</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { display: flex; flex-direction: column; align-items: center; background-color: #2c3e50; color: white; font-family: sans-serif; }
        #myBoard { width: 400px; margin-top: 20px; }
        #info { margin-top: 20px; text-align: center; }
        #history { height: 100px; overflow-y: scroll; background: #34495e; padding: 10px; width: 380px; margin-top: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <h2>Checkmate-hubb</h2>
    <div id="timer">Time: <span id="time">00:00</span></div>
    <div id="myBoard"></div>
    <div id="info">
        <h3>Move History</h3>
        <div id="history"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var seconds = 0;

        // Timer Logic
        setInterval(function() {
            seconds++;
            var mins = Math.floor(seconds / 60);
            var secs = seconds % 60;
            document.getElementById('time').innerText = 
                (mins < 10 ? "0" + mins : mins) + ":" + (secs < 10 ? "0" + secs : secs);
        }, 1000);

        function updateHistory(move) {
            var historyDiv = document.getElementById('history');
            historyDiv.innerHTML += "<div>" + move.from + " to " + move.to + "</div>";
            historyDiv.scrollTop = historyDiv.scrollHeight;
        }

        function makeRandomMove () {
            var possibleMoves = game.moves();
            if (possibleMoves.length === 0) return;
            var randomIndex = Math.floor(Math.random() * possibleMoves.length);
            var move = game.move(possibleMoves[randomIndex]);
            board.position(game.fen());
            updateHistory(move);
        }

        function onDrop (source, target) {
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            updateHistory(move);
            window.setTimeout(makeRandomMove, 250);
        }

        var config = { draggable: true, position: 'start', onDrop: onDrop };
        board = Chessboard('myBoard', config);
    </script>
</body>
</html>
