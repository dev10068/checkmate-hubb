<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
  <style>
    :root{ --bg: #14141c; --surface: #1c1c28; --surface-2: #242432; --border: #34344a; --text: #ece7da; --accent: #c9a227; }
    body { background: #14141c; color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; }
    .page { max-width: 460px; margin: 0 auto; }
    .board-wrap { position: relative; width: 100%; }
    #board { width: 100%; }
    #tap-overlay { position: absolute; inset: 0; display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr); z-index: 10; }
    .tap-cell { cursor: pointer; }
    .tap-cell.selected { background: rgba(201, 162, 39, 0.3); }
    .panel-block { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-top: 20px; }
    .controls { display: flex; gap: 8px; margin-top: 10px; }
    button { border: 1px solid var(--border); background: var(--surface-2); color: white; padding: 10px; border-radius: 8px; cursor: pointer; flex: 1; }
    button.active { border-color: var(--accent); background: var(--accent); color: black; }
  </style>
</head>
<body>

<div class="page">
  <h1 style="text-align:center" id="mode-text">PvP Mode</h1>
  <div class="board-wrap">
    <div id="board"></div>
    <div id="tap-overlay"></div>
  </div>
  <div class="panel-block">
    <div class="controls">
      <button id="btn-pvp" class="active">PvP</button>
      <button id="btn-pvc">Vs Computer</button>
    </div>
    <button id="btn-new" style="width:100%; margin-top:10px;">Reset Game</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<script>
  var game = new Chess();
  var isPvC = false, selectedSquare = null;

  // Piece Rendering - Yahi tumhare phone pe kaam kar raha tha
  function pieceTheme(p) {
    return 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text x="50" y="80" text-anchor="middle" font-size="82" font-family="Arial" fill="'+(p[0]=='w'?'#f4ecd8':'#2a2a38')+'" stroke="'+(p[0]=='w'?'#3a2e1a':'#f4ecd8')+'" stroke-width="2.5" paint-order="stroke">'+{'wP':'тЩЩ','wN':'тЩШ','wB':'тЩЧ','wR':'тЩЦ','wQ':'тЩХ','wK':'тЩФ','bP':'тЩЯ','bN':'тЩЮ','bB':'тЩЭ','bR':'тЩЬ','bQ':'тЩЫ','bK':'тЩЪ'}[p]+'</text></svg>');
  }

  var board = Chessboard('board', { position: 'start', draggable: false, pieceTheme: pieceTheme });

  // Mobile Tap Logic
  function handleTap(sq) {
    if (game.game_over()) return;
    if (!selectedSquare) {
      if (game.get(sq) && game.get(sq).color === game.turn()) {
        selectedSquare = sq;
        $('.tap-cell').removeClass('selected');
        $(`[data-sq="${sq}"]`).addClass('selected');
      }
    } else {
      if (game.move({ from: selectedSquare, to: sq, promotion: 'q' })) {
        board.position(game.fen());
        selectedSquare = null;
        $('.tap-cell').removeClass('selected');
        if (isPvC && !game.game_over()) window.setTimeout(makeComputerMove, 500);
      } else {
        selectedSquare = null;
        $('.tap-cell').removeClass('selected');
      }
    }
  }

  function makeComputerMove() {
    var moves = game.moves();
    game.move(moves[Math.floor(Math.random() * moves.length)]);
    board.position(game.fen());
  }

  // Generate Tap Overlay
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      let sq = String.fromCharCode(97 + c) + (8 - r);
      $('#tap-overlay').append(`<div class="tap-cell" data-sq="${sq}" onclick="handleTap('${sq}')"></div>`);
    }
  }

  $('#btn-pvp').click(function() { isPvC=false; $('#mode-text').text('PvP Mode'); $(this).addClass('active'); $('#btn-pvc').removeClass('active'); });
  $('#btn-pvc').click(function() { isPvC=true; $('#mode-text').text('Vs CPU Mode'); $(this).addClass('active'); $('#btn-pvp').removeClass('active'); });
  $('#btn-new').click(function() { game.reset(); board.start(); });
</script>
</body>
</html>
