<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess</title>

  <!-- ✅ PWA Meta Tags -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#14141c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Chess">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512x512.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
  <link rel="icon" type="image/png" sizes="32x32"  href="icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16"  href="icons/favicon-16x16.png">
  <!-- iOS Splash Screens -->
  <link rel="apple-touch-startup-image" href="icons/splash-iphone-14-pro.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)">
  <link rel="apple-touch-startup-image" href="icons/splash-iphone-8.png"      media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)">
  <link rel="apple-touch-startup-image" href="icons/splash-iphone-se.png"     media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2)">
  <link rel="apple-touch-startup-image" href="icons/splash-ipad.png"          media="(device-width: 768px) and (device-height: 1024px) and (-webkit-device-pixel-ratio: 2)">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
  <style>
    :root{
      --bg: #14141c;
      --surface: #1c1c28;
      --surface-2: #242432;
      --border: #34344a;
      --text: #ece7da;
      --text-dim: #9290a3;
      --accent: #c9a227;
      --accent-soft: rgba(201, 162, 39, 0.16);
      --board-light: #e9dcc0;
      --board-dark: #6b4a33;
      --bad: #c1554a;
      --font-display: 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif;
      --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: radial-gradient(circle at 20% -10%, #1f1f30 0%, var(--bg) 55%);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
    }
    .page { max-width: 960px; margin: 0 auto; padding: 32px 20px 56px; }
    header.app-header { text-align: center; margin-bottom: 28px; }
    header.app-header h1 {
      font-family: var(--font-display);
      font-weight: 600; letter-spacing: 0.04em;
      font-size: 2.6rem; margin: 0 0 6px; color: var(--text);
    }
    .rule { width: 64px; height: 2px; background: var(--accent); margin: 0 auto 12px; border-radius: 2px; }
    header.app-header p { margin: 0; color: var(--text-dim); font-size: 0.95rem; letter-spacing: 0.02em; }

    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 480px) minmax(220px, 320px);
      gap: 24px; align-items: start; justify-content: center;
    }
    @media (max-width: 760px) { .layout { grid-template-columns: 1fr; } }

    .board-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px;
      box-shadow: 0 18px 40px -20px rgba(0,0,0,0.6);
    }
    .board-wrap { position: relative; width: 100%; max-width: 460px; margin: 0 auto; }
    #board { width: 100%; }

    #tap-overlay {
      position: absolute; inset: 0;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      z-index: 5;
    }
    .tap-cell { position: relative; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .tap-cell.selected { box-shadow: inset 0 0 0 4px var(--accent); background: rgba(201,162,39,0.18); }
    .tap-cell.legal-target::after {
      content: ''; position: absolute;
      top: 50%; left: 50%; width: 30%; height: 30%;
      background: rgba(201,162,39,0.6); border-radius: 50%;
      transform: translate(-50%,-50%); pointer-events: none;
    }
    .tap-cell.legal-target.has-piece::after {
      width: 92%; height: 92%; background: transparent;
      box-shadow: inset 0 0 0 4px rgba(201,162,39,0.7); border-radius: 6px;
    }

    .white-1e1d7 { background-color: var(--board-light) !important; color: #8a6a3c !important; }
    .black-3c85d { background-color: var(--board-dark) !important; color: var(--board-light) !important; }
    .board-b72b1 { border: 6px solid #2c2c3a !important; border-radius: 4px; }
    .highlight1-32417, .highlight2-9c5d2 { box-shadow: inset 0 0 0 4px rgba(201,162,39,0.65) !important; }

    .side-panel { display: flex; flex-direction: column; gap: 16px; }
    .panel-block { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; }
    .panel-block h2 { margin: 0 0 10px; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-dim); font-weight: 600; }

    .mode-buttons { display: flex; flex-direction: column; gap: 8px; }
    .mode-btn {
      appearance: none; border: 1px solid var(--border);
      background: var(--surface-2); color: var(--text);
      font-family: var(--font-body); font-size: 0.82rem; font-weight: 500;
      padding: 10px 12px; border-radius: 8px; cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.05s;
      text-align: left; display: flex; align-items: center; gap: 10px;
    }
    .mode-btn:hover { border-color: var(--accent); background: #2a2a3a; }
    .mode-btn:active { transform: translateY(1px); }
    .mode-btn.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent);
    }
    .mode-btn .mode-icon { font-size: 1.2rem; width: 22px; text-align: center; }
    .mode-btn .mode-label { font-weight: 600; }
    .mode-btn .mode-desc { font-size: 0.75rem; color: var(--text-dim); display: block; margin-top: 1px; }
    .mode-btn.active .mode-desc { color: var(--accent); opacity: 0.75; }

    .turn-row { display: flex; align-items: center; gap: 10px; }
    .turn-dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft);
      transition: background 0.25s, box-shadow 0.25s;
    }
    .turn-dot.black-turn { background: #cfcad8; box-shadow: 0 0 0 4px rgba(207,202,216,0.16); }
    #status-text { font-size: 1rem; font-weight: 500; }
    #status-text.check { color: var(--bad); }
    #status-text.over { color: var(--accent); }

    .captured-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.85rem; color: var(--text-dim); padding: 6px 0; }
    .captured-row + .captured-row { border-top: 1px solid var(--border); }
    .captured-pieces { font-size: 1.25rem; letter-spacing: 1px; color: var(--text); min-height: 1.4em; }

    #move-list { max-height: 180px; overflow-y: auto; font-size: 0.88rem; line-height: 1.7; color: var(--text); padding-right: 4px; }
    #move-list::-webkit-scrollbar { width: 6px; }
    #move-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .empty-hint { color: var(--text-dim); font-size: 0.85rem; }

    .controls { display: flex; gap: 10px; flex-wrap: wrap; }
    button.ctrl-btn {
      appearance: none; border: 1px solid var(--border);
      background: var(--surface-2); color: var(--text);
      font-family: var(--font-body); font-size: 0.85rem; font-weight: 500;
      padding: 9px 14px; border-radius: 8px; cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.05s;
    }
    button.ctrl-btn:hover { border-color: var(--accent); background: #2a2a3a; }
    button.ctrl-btn:active { transform: translateY(1px); }
    button.ctrl-btn.primary { border-color: var(--accent); color: #14141c; background: var(--accent); }
    button.ctrl-btn.primary:hover { background: #d9b13d; }

    /* Difficulty selector */
    #difficulty-block { display: none; }
    #difficulty-block.show { display: block; }
    .diff-buttons { display: flex; gap: 8px; }
    .diff-btn {
      flex: 1; appearance: none; border: 1px solid var(--border);
      background: var(--surface-2); color: var(--text);
      font-family: var(--font-body); font-size: 0.8rem; font-weight: 600;
      padding: 9px 6px; border-radius: 8px; cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.05s;
      text-align: center;
    }
    .diff-btn:hover { border-color: var(--accent); background: #2a2a3a; }
    .diff-btn:active { transform: translateY(1px); }
    .diff-btn.active { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }
    .diff-btn .diff-icon { display: block; font-size: 1.1rem; margin-bottom: 3px; }

    #thinking-bar {
      display: none; align-items: center; gap: 8px;
      font-size: 0.8rem; color: var(--text-dim); margin-top: 8px;
    }
    #thinking-bar.show { display: flex; }
    .dot-pulse { display: flex; gap: 4px; }
    .dot-pulse span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); animation: pulse 1.2s infinite;
    }
    .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
    .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

    /* Rules Button */
    #rules-btn {
      position: fixed; top: 18px; right: 18px; z-index: 100;
      appearance: none; border: 1px solid var(--accent);
      background: var(--surface); color: var(--accent);
      font-family: var(--font-body); font-size: 0.82rem; font-weight: 600;
      padding: 8px 14px; border-radius: 20px; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      transition: background 0.15s, transform 0.1s;
    }
    #rules-btn:hover { background: var(--accent-soft); transform: translateY(-1px); }
    #rules-btn:active { transform: translateY(0); }

    /* Modal Overlay */
    #rules-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.65); backdrop-filter: blur(4px);
      animation: fadeIn 0.2s ease;
    }
    #rules-overlay.open { display: flex; align-items: flex-end; justify-content: center; }
    @media (min-width: 600px) { #rules-overlay.open { align-items: center; } }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }

    /* Rules Drawer */
    #rules-drawer {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px 20px 0 0; width: 100%; max-width: 620px;
      max-height: 88vh; display: flex; flex-direction: column;
      animation: slideUp 0.25s ease;
    }
    @media (min-width: 600px) {
      #rules-drawer { border-radius: 16px; max-height: 82vh; }
    }
    @keyframes slideUp { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }

    .rules-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px 14px; border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .rules-header h2 {
      margin: 0; font-family: var(--font-display); font-size: 1.3rem;
      font-weight: 600; color: var(--text);
    }
    #rules-close {
      appearance: none; border: 1px solid var(--border); background: var(--surface-2);
      color: var(--text-dim); font-size: 1.1rem; width: 32px; height: 32px;
      border-radius: 50%; cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: border-color 0.15s, color 0.15s;
    }
    #rules-close:hover { border-color: var(--accent); color: var(--accent); }

    /* Lang Toggle */
    .lang-toggle {
      display: flex; gap: 0; padding: 14px 20px 10px; flex-shrink: 0;
    }
    .lang-btn {
      flex: 1; appearance: none; border: 1px solid var(--border);
      background: var(--surface-2); color: var(--text-dim);
      font-family: var(--font-body); font-size: 0.82rem; font-weight: 600;
      padding: 8px; cursor: pointer; transition: all 0.15s;
    }
    .lang-btn:first-child { border-radius: 8px 0 0 8px; }
    .lang-btn:last-child  { border-radius: 0 8px 8px 0; border-left: none; }
    .lang-btn.active { background: var(--accent); color: #14141c; border-color: var(--accent); }

    /* Rules Content */
    #rules-content {
      overflow-y: auto; padding: 10px 20px 28px; flex: 1;
    }
    #rules-content::-webkit-scrollbar { width: 6px; }
    #rules-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .rules-section {
      margin-bottom: 18px; border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }
    .rules-section-header {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 14px; background: var(--surface-2);
      font-weight: 700; font-size: 0.92rem; color: var(--accent);
    }
    .rules-section-header .piece-icon { font-size: 1.3rem; }
    .rules-section ul {
      margin: 0; padding: 10px 14px 12px 32px;
      list-style: disc; color: var(--text); font-size: 0.88rem; line-height: 1.75;
    }
    .rules-section ul li { margin-bottom: 2px; }
    .rules-tag {
      display: inline-block; font-size: 0.7rem; font-weight: 700;
      padding: 1px 6px; border-radius: 4px; margin-left: 4px;
      background: var(--accent-soft); color: var(--accent); vertical-align: middle;
    }
    .rules-tag.red { background: rgba(193,85,74,0.18); color: var(--bad); }
  
  </style>
</head>
<body>
<!-- Rules Button -->
<button id="rules-btn">📖 Rules</button>

<!-- Rules Modal -->
<div id="rules-overlay">
  <div id="rules-drawer">
    <div class="rules-header">
      <h2>♟ Chess Rules</h2>
      <button id="rules-close">✕</button>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" id="lang-en">🇬🇧 English</button>
      <button class="lang-btn" id="lang-hi">🇮🇳 Hinglish</button>
    </div>
    <div id="rules-content">
      <!-- injected by JS -->
    </div>
  </div>
</div>

<div class="page">
  <header class="app-header">
    <h1>Chess</h1>
    <div class="rule"></div>
    <p id="header-sub">Player vs Player</p>
  </header>

  <div class="layout">
    <div class="board-card">
      <div class="board-wrap">
        <div id="board"></div>
        <div id="tap-overlay"></div>
      </div>
      <div id="thinking-bar">
        <div class="dot-pulse"><span></span><span></span><span></span></div>
        <span id="thinking-text">Computer is thinking…</span>
      </div>
    </div>

    <div class="side-panel">

      <div class="panel-block">
        <h2>Game Mode</h2>
        <div class="mode-buttons">
          <button class="mode-btn active" id="mode-pvp">
            <span class="mode-icon">👥</span>
            <span>
              <span class="mode-label">Player vs Player</span>
              <span class="mode-desc">Two humans, one board</span>
            </span>
          </button>
          <button class="mode-btn" id="mode-pvc">
            <span class="mode-icon">🤖</span>
            <span>
              <span class="mode-label">Player vs Computer</span>
              <span class="mode-desc">You play White, AI plays Black</span>
            </span>
          </button>
          <button class="mode-btn" id="mode-cvc">
            <span class="mode-icon">⚙️</span>
            <span>
              <span class="mode-label">Computer vs Computer</span>
              <span class="mode-desc">Watch the AI play itself</span>
            </span>
          </button>
        </div>
      </div>

      <!-- DIFFICULTY (only shown in PvC mode) -->
      <div class="panel-block" id="difficulty-block">
        <h2>Difficulty</h2>
        <div class="diff-buttons">
          <button class="diff-btn active" id="diff-easy">
            <span class="diff-icon">🟢</span>Easy
          </button>
          <button class="diff-btn" id="diff-moderate">
            <span class="diff-icon">🟡</span>Moderate
          </button>
          <button class="diff-btn" id="diff-hard">
            <span class="diff-icon">🔴</span>Hard
          </button>
        </div>
      </div>

      <div class="panel-block">
        <h2>Status</h2>
        <div class="turn-row">
          <span class="turn-dot" id="turn-dot"></span>
          <span id="status-text">White to move</span>
        </div>
      </div>

      <div class="panel-block">
        <h2>Captured</h2>
        <div class="captured-row"><span>By White</span><span class="captured-pieces" id="captured-by-white">—</span></div>
        <div class="captured-row"><span>By Black</span><span class="captured-pieces" id="captured-by-black">—</span></div>
      </div>

      <div class="panel-block">
        <h2>Moves</h2>
        <div id="move-list"><span class="empty-hint">No moves yet</span></div>
      </div>

      <div class="panel-block">
        <h2>Controls</h2>
        <div class="controls">
          <button class="ctrl-btn primary" id="btn-new">New Game</button>
          <button class="ctrl-btn" id="btn-undo">Undo</button>
          <button class="ctrl-btn" id="btn-flip">Flip Board</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<script>
(function () {
  'use strict';

  var game = new Chess();
  var board = null;
  var mode = 'pvp';
  var difficulty = 'easy'; // 'easy' | 'moderate' | 'hard'
  var aiTimer = null;
  var capturedByWhite = [];
  var capturedByBlack = [];

  var unicodePieces = {
    wP:'♙', wN:'♘', wB:'♗', wR:'♖', wQ:'♕', wK:'♔',
    bP:'♟', bN:'♞', bB:'♝', bR:'♜', bQ:'♛', bK:'♚'
  };
  var pieceSymbols = {
    p:'♟', n:'♞', b:'♝', r:'♜', q:'♛', k:'♚',
    P:'♙', N:'♘', B:'♗', R:'♖', Q:'♕', K:'♔'
  };
  var pieceCache = {};
  function pieceTheme(piece) {
    if (pieceCache[piece]) return pieceCache[piece];
    var isWhite = piece[0] === 'w';
    var fill = isWhite ? '#f4ecd8' : '#2a2a38';
    var stroke = isWhite ? '#3a2e1a' : '#f4ecd8';
    var glyph = unicodePieces[piece];
    var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">' +
      '<text x="50" y="80" text-anchor="middle" font-size="82" font-family="Arial" ' +
      'fill="' + fill + '" stroke="' + stroke + '" stroke-width="2.5" paint-order="stroke">' +
      glyph + '</text></svg>';
    pieceCache[piece] = 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg);
    return pieceCache[piece];
  }

  board = Chessboard('board', { position: 'start', draggable: false, pieceTheme: pieceTheme });

  var overlay = document.getElementById('tap-overlay');
  for (var r = 0; r < 8; r++) {
    for (var c = 0; c < 8; c++) {
      var cell = document.createElement('div');
      cell.className = 'tap-cell';
      cell.setAttribute('data-row', r);
      cell.setAttribute('data-col', c);
      cell.addEventListener('click', (function(row, col) {
        return function() { handleTap(squareForCell(row, col)); };
      })(r, c));
      overlay.appendChild(cell);
    }
  }

  function squareForCell(row, col) {
    var files = ['a','b','c','d','e','f','g','h'];
    return board.orientation() === 'white'
      ? files[col] + (8 - row)
      : files[7 - col] + (row + 1);
  }

  function cellForSquare(sq) {
    var col = sq.charCodeAt(0) - 97;
    var rank = parseInt(sq[1]);
    var row, c;
    if (board.orientation() === 'white') {
      row = 8 - rank; c = col;
    } else {
      row = rank - 1; c = 7 - col;
    }
    return document.querySelector('[data-row="' + row + '"][data-col="' + c + '"]');
  }

  var selectedSquare = null;

  function clearHighlights() {
    document.querySelectorAll('.tap-cell').forEach(function(c) {
      c.classList.remove('selected', 'legal-target', 'has-piece');
    });
  }

  function showHighlights(square) {
    clearHighlights();
    var legalMoves = game.moves({ square: square, verbose: true });
    legalMoves.forEach(function(m) {
      var cell = cellForSquare(m.to);
      if (cell) {
        cell.classList.add('legal-target');
        if (game.get(m.to)) cell.classList.add('has-piece');
      }
    });
    var selCell = cellForSquare(square);
    if (selCell) selCell.classList.add('selected');
  }

  function handleTap(square) {
    if (mode === 'cvc') return;
    if (mode === 'pvc' && game.turn() === 'b') return;
    if (game.game_over()) return;

    var piece = game.get(square);

    if (selectedSquare === null) {
      if (piece && piece.color === game.turn()) {
        selectedSquare = square;
        showHighlights(square);
      }
      return;
    }

    if (square === selectedSquare) {
      clearHighlights();
      selectedSquare = null;
      return;
    }

    var moved = game.move({ from: selectedSquare, to: square, promotion: 'q' });
    clearHighlights();
    selectedSquare = null;

    if (moved) {
      trackCapture(moved);
      board.position(game.fen());
      updateGameUI();
      if (!game.game_over() && mode === 'pvc') {
        scheduleAI(400);
      }
    } else {
      if (piece && piece.color === game.turn()) {
        selectedSquare = square;
        showHighlights(square);
      }
    }
  }

  // ── Stockfish Engine (Hard mode) ───────────────────────────────────────────
  var stockfish = null;
  var stockfishReady = false;
  var stockfishCallback = null;

  function initStockfish() {
    if (stockfish) return;
    try {
      stockfish = new Worker('https://cdn.jsdelivr.net/npm/stockfish@16.0.0/src/stockfish.js');
      stockfish.onmessage = function(e) {
        var line = e.data;
        if (line === 'uciok') { stockfish.postMessage('isready'); }
        if (line === 'readyok') { stockfishReady = true; }
        // Parse bestmove
        if (line.startsWith('bestmove') && stockfishCallback) {
          var parts = line.split(' ');
          var uciMove = parts[1];
          if (uciMove && uciMove !== '(none)' && stockfishCallback) {
            stockfishCallback(uciMove);
            stockfishCallback = null;
          }
        }
      };
      stockfish.onerror = function() { stockfish = null; stockfishReady = false; };
      stockfish.postMessage('uci');
    } catch(e) { stockfish = null; }
  }

  function askStockfish(fen, depth, callback) {
    if (!stockfish || !stockfishReady) { callback(null); return; }
    stockfishCallback = callback;
    stockfish.postMessage('position fen ' + fen);
    stockfish.postMessage('go depth ' + depth);
  }

  function scheduleAI(delay) {
    if (aiTimer) clearTimeout(aiTimer);
    setThinking(true);
    aiTimer = setTimeout(function() {
      makeAIMove();
    }, delay);
  }

  function makeAIMove() {
    if (game.game_over()) { setThinking(false); return; }

    // Hard mode — use Stockfish
    if (difficulty === 'hard' && mode !== 'cvc' && stockfish && stockfishReady) {
      askStockfish(game.fen(), 18, function(uciMove) {
        if (uciMove) {
          var from = uciMove.slice(0, 2);
          var to   = uciMove.slice(2, 4);
          var promo = uciMove[4] || 'q';
          var result = game.move({ from: from, to: to, promotion: promo });
          if (result) trackCapture(result);
        } else {
          // Fallback to minimax if Stockfish fails
          var move = pickMoveMinimax();
          if (move) { var r = game.move(move); if (r) trackCapture(r); }
        }
        board.position(game.fen());
        updateGameUI();
        setThinking(false);
        if (mode === 'cvc' && !game.game_over()) scheduleAI(600);
      });
      return;
    }

    // Easy / Moderate (or CvC)
    var move = pickMove();
    if (move) {
      var result = game.move(move);
      if (result) trackCapture(result);
      board.position(game.fen());
      updateGameUI();
    }
    setThinking(false);

    if (mode === 'cvc' && !game.game_over()) {
      scheduleAI(600);
    }
  }

  var pieceValues = { p:1, n:3, b:3, r:5, q:9, k:0 };

  function evaluateBoard() {
    var score = 0;
    var board_state = game.board();
    board_state.forEach(function(row) {
      row.forEach(function(piece) {
        if (!piece) return;
        var val = pieceValues[piece.type] || 0;
        score += piece.color === game.turn() ? val : -val;
      });
    });
    return score;
  }

  function minimax(depth, alpha, beta, maximizing) {
    if (depth === 0 || game.game_over()) return evaluateBoard();
    var moves = game.moves({ verbose: true });
    if (maximizing) {
      var best = -Infinity;
      for (var i = 0; i < moves.length; i++) {
        game.move(moves[i]);
        var val = minimax(depth - 1, alpha, beta, false);
        game.undo();
        best = Math.max(best, val);
        alpha = Math.max(alpha, best);
        if (beta <= alpha) break;
      }
      return best;
    } else {
      var best = Infinity;
      for (var i = 0; i < moves.length; i++) {
        game.move(moves[i]);
        var val = minimax(depth - 1, alpha, beta, true);
        game.undo();
        best = Math.min(best, val);
        beta = Math.min(beta, best);
        if (beta <= alpha) break;
      }
      return best;
    }
  }

  function pickMoveMinimax() {
    var moves = game.moves({ verbose: true });
    if (!moves.length) return null;
    var bestMove = null, bestScore = -Infinity;
    moves.forEach(function(m) {
      game.move(m);
      var score = minimax(2, -Infinity, Infinity, false);
      game.undo();
      if (score > bestScore) { bestScore = score; bestMove = m; }
    });
    return bestMove;
  }

  function pickMove() {
    var moves = game.moves({ verbose: true });
    if (moves.length === 0) return null;

    // EASY
    if (difficulty === 'easy') {
      var scored = moves.map(function(m) {
        var score = 0;
        if (m.captured) score += pieceValues[m.captured] * 10;
        if (m.promotion) score += 80;
        game.move(m);
        if (game.in_checkmate()) score += 1000;
        game.undo();
        score += Math.random() * 20;
        return { move: m, score: score };
      });
      scored.sort(function(a, b) { return b.score - a.score; });
      var topN = Math.max(1, Math.floor(moves.length * 0.6));
      return scored[Math.floor(Math.random() * topN)].move;
    }

    // MODERATE
    if (difficulty === 'moderate') {
      var scored = moves.map(function(m) {
        game.move(m);
        var score = minimax(1, -Infinity, Infinity, false);
        game.undo();
        score += Math.random() * 1.5;
        return { move: m, score: score };
      });
      scored.sort(function(a, b) { return b.score - a.score; });
      var topN = Math.min(3, scored.length);
      return scored[Math.floor(Math.random() * topN)].move;
    }

    // HARD fallback (if Stockfish not ready yet)
    return pickMoveMinimax();
  }

  function setThinking(on) {
    var bar = document.getElementById('thinking-bar');
    var txt = document.getElementById('thinking-text');
    if (on) {
      var who = (game.turn() === 'w') ? 'White' : 'Black';
      txt.textContent = (mode === 'cvc') ? who + ' is thinking…' : 'Computer is thinking…';
      bar.classList.add('show');
    } else {
      bar.classList.remove('show');
    }
  }

  function trackCapture(moveResult) {
    if (!moveResult.captured) return;
    var sym = pieceSymbols[moveResult.color === 'w'
      ? moveResult.captured.toUpperCase()
      : moveResult.captured.toLowerCase()];
    if (sym) {
      if (moveResult.color === 'w') capturedByWhite.push(sym);
      else capturedByBlack.push(sym);
    }
  }

  function updateCaptured() {
    var cw = document.getElementById('captured-by-white');
    var cb = document.getElementById('captured-by-black');
    cw.textContent = capturedByWhite.length ? capturedByWhite.join('') : '—';
    cb.textContent = capturedByBlack.length ? capturedByBlack.join('') : '—';
  }

  function updateGameUI() {
    var whiteTurn = game.turn() === 'w';
    var dot = document.getElementById('turn-dot');
    var st = document.getElementById('status-text');

    dot.classList.toggle('black-turn', !whiteTurn);

    if (game.in_checkmate()) {
      st.textContent = (whiteTurn ? 'Black' : 'White') + ' wins! Checkmate!';
      st.className = 'over';
    } else if (game.in_draw()) {
      st.textContent = 'Draw!';
      st.className = 'over';
    } else if (game.in_check()) {
      st.textContent = (whiteTurn ? 'White' : 'Black') + ' is in Check!';
      st.className = 'check';
    } else {
      st.textContent = (whiteTurn ? 'White' : 'Black') + ' to move';
      st.className = '';
    }

    var hist = game.history();
    if (hist.length === 0) {
      document.getElementById('move-list').innerHTML = '<span class="empty-hint">No moves yet</span>';
    } else {
      var rows = '';
      for (var i = 0; i < hist.length; i += 2) {
        rows += '<div style="display:grid;grid-template-columns:2em 1fr 1fr;gap:6px">' +
          '<span style="color:var(--text-dim)">' + (i/2+1) + '.</span>' +
          '<span>' + hist[i] + '</span>' +
          '<span>' + (hist[i+1] || '') + '</span>' +
          '</div>';
      }
      var ml = document.getElementById('move-list');
      ml.innerHTML = rows;
      ml.scrollTop = ml.scrollHeight;
    }

    updateCaptured();
  }

  function setMode(m) {
    mode = m;
    if (aiTimer) clearTimeout(aiTimer);
    setThinking(false);

    ['pvp','pvc','cvc'].forEach(function(id) {
      document.getElementById('mode-' + id).classList.toggle('active', id === m);
    });

    var labels = { pvp: 'Player vs Player', pvc: 'Player vs Computer', cvc: 'Computer vs Computer' };
    document.getElementById('header-sub').textContent = labels[m];

    overlay.style.pointerEvents = (m === 'cvc') ? 'none' : 'auto';

    // Show difficulty only in PvC mode
    document.getElementById('difficulty-block').classList.toggle('show', m === 'pvc');

    // Load Stockfish when PvC selected
    if (m === 'pvc') initStockfish();

    startNewGame();
  }

  function setDifficulty(d) {
    difficulty = d;
    ['easy','moderate','hard'].forEach(function(id) {
      document.getElementById('diff-' + id).classList.toggle('active', id === d);
    });
    startNewGame();
  }

  function startNewGame() {
    if (aiTimer) clearTimeout(aiTimer);
    setThinking(false);
    game.reset();
    board.position('start');
    capturedByWhite = [];
    capturedByBlack = [];
    selectedSquare = null;
    clearHighlights();
    updateGameUI();

    if (mode === 'cvc') {
      scheduleAI(800);
    }
  }

  document.getElementById('mode-pvp').addEventListener('click', function() { setMode('pvp'); });
  document.getElementById('mode-pvc').addEventListener('click', function() { setMode('pvc'); });
  document.getElementById('mode-cvc').addEventListener('click', function() { setMode('cvc'); });

  document.getElementById('diff-easy').addEventListener('click', function() { setDifficulty('easy'); });
  document.getElementById('diff-moderate').addEventListener('click', function() { setDifficulty('moderate'); });
  document.getElementById('diff-hard').addEventListener('click', function() { setDifficulty('hard'); });

  document.getElementById('btn-new').addEventListener('click', function() { startNewGame(); });

  document.getElementById('btn-undo').addEventListener('click', function() {
    if (aiTimer) clearTimeout(aiTimer);
    setThinking(false);
    if (mode === 'pvc') { game.undo(); game.undo(); }
    else game.undo();
    board.position(game.fen());
    rebuildCaptured();
    updateGameUI();
  });

  document.getElementById('btn-flip').addEventListener('click', function() {
    board.flip();
    clearHighlights();
    selectedSquare = null;
  });

  function rebuildCaptured() {
    capturedByWhite = [];
    capturedByBlack = [];
    var hist = game.history({ verbose: true });
    hist.forEach(function(m) { trackCapture(m); });
  }

  updateGameUI();

      html += '<div class="rules-section">';

      html += '<ul>';
      section.items.forEach(function(item) {
        html += '<li>' + item + '</li>';
      });
      html += '</ul></div>';
    });
    document.getElementById('rules-content').innerHTML = html;
  }
