<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkmate-hubb</title>
    
    <!-- CSS Dependencies -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <style>
        body { 
            display: flex; flex-direction: column; align-items: center; 
            background-color: #2c3e50; color: white; font-family: sans-serif; 
            margin: 0; padding: 20px;
        }
        #myBoard { width: 100%; max-width: 400px; margin-top: 20px; }
        #info { margin-top: 20px; text-align: center; width: 100%; max-width: 400px; }
        #history { 
            height: 150px; overflow-y: scroll; background: #34495e; 
            padding: 10px; margin-top: 10px; border-radius: 5px; 
            text-align: left;
        }
    </style>
</head>
<body>

    <h2>Checkmate-hubb</h2>
    <div id="timer">Time: <span id="time">00:00</span></div>
    <div id="myBoard"></div>
    
    <div id="info">
        <h3>Move History</h3>
        <div id="history"></div>
    </div>

    <!-- JS Dependencies -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var seconds = 0;

        // Timer Logic
        setInterval(function() {
            seconds++;
            var mins = Math.floor(seconds / 60);
            var secs = seconds % 60;
            document.getElementById('time').innerText = 
                (mins < 10 ? "0" + mins : mins) + ":" + (secs < 10 ? "0" + secs : secs);
        }, 1000);

        function updateHistory(move) {
            var historyDiv = document.getElementById('history');
            historyDiv.innerHTML += "<div>" + (game.history().length) + ". " + move.from + " to " + move.to + "</div>";
            historyDiv.scrollTop = historyDiv.scrollHeight;
        }

        function makeRandomMove () {
            var possibleMoves = game.moves();
            if (possibleMoves.length === 0) return;
            var move = game.move(possibleMoves[Math.floor(Math.random() * possibleMoves.length)]);
            board.position(game.fen());
            updateHistory(move);
        }

        var config = {
            draggable: true,
            position: 'start',
            // Yeh line pieces load karne ke liye zaroori hai
            pieceTheme: 'https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/img/chesspieces/wikipedia/{piece}.png',
            onDrop: function(source, target) {
                var move = game.move({ from: source, to: target, promotion: 'q' });
                if (move === null) return 'snapback';
                updateHistory(move);
                window.setTimeout(makeRandomMove, 250);
            }
        };
        board = Chessboard('myBoard', config);
    </script>
</body>
</html>
