<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkmate-hubb</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
  <style>
    :root { --bg: #14141c; --surface: #1c1c28; --accent: #c9a227; --text: #ece7da; }
    html, body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    .page { width: 100%; max-width: 500px; padding: 20px; text-align: center; }
    .board-wrap { position: relative; width: 100%; margin: 20px 0; }
    #board { width: 100%; }
    #tap-overlay { position: absolute; inset: 0; display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr); z-index: 5; }
    .tap-cell { cursor: pointer; }
    .tap-cell.selected { background: rgba(201, 162, 39, 0.4); }
    .controls { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
    button { padding: 12px 15px; border-radius: 8px; border: 1px solid #34344a; background: #242432; color: white; cursor: pointer; font-weight: bold; }
    button.active { border-color: var(--accent); background: var(--accent); color: black; }
  </style>
</head>
<body>

<div class="page">
  <h1 id="mode-text">PvP Mode</h1>
  <div class="board-wrap">
    <div id="board"></div>
    <div id="tap-overlay"></div>
  </div>
  <div class="controls">
    <button id="btn-pvp" class="active">PvP</button>
    <button id="btn-pvc">Vs CPU</button>
    <button id="btn-new">Reset</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<script>
  var game = new Chess();
  var board = Chessboard('board', { position: 'start', draggable: false });
  var isPvC = false, selectedSquare = null;

  function handleTap(sq) {
    if (game.game_over()) return;
    if (!selectedSquare) {
      let piece = game.get(sq);
      if (piece && piece.color === game.turn()) {
        selectedSquare = sq;
        $('.tap-cell').removeClass('selected');
        $(`[data-sq="${sq}"]`).addClass('selected');
      }
    } else {
      if (game.move({ from: selectedSquare, to: sq, promotion: 'q' })) {
        board.position(game.fen());
        selectedSquare = null;
        $('.tap-cell').removeClass('selected');
        if (isPvC && !game.game_over()) window.setTimeout(makeComputerMove, 500);
      } else {
        selectedSquare = null;
        $('.tap-cell').removeClass('selected');
      }
    }
  }

  function makeComputerMove() {
    let moves = game.moves();
    if (moves.length === 0) return;
    game.move(moves[Math.floor(Math.random() * moves.length)]);
    board.position(game.fen());
  }

  /* Overlay Setup */
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      let sq = String.fromCharCode(97 + c) + (8 - r);
      $('#tap-overlay').append(`<div class="tap-cell" data-sq="${sq}" onclick="handleTap('${sq}')"></div>`);
    }
  }

  /* Mode Switching */
  $('#btn-pvp').click(function() { isPvC = false; $('#mode-text').text('PvP Mode'); $(this).addClass('active'); $('#btn-pvc').removeClass('active'); });
  $('#btn-pvc').click(function() { isPvC = true; $('#mode-text').text('Vs CPU Mode'); $(this).addClass('active'); $('#btn-pvp').removeClass('active'); });
  $('#btn-new').click(function() { game.reset(); board.start(); selectedSquare = null; });
</script>
</body>
</html>
