<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
  <style>
    :root{
      --bg: #14141c;
      --surface: #1c1c28;
      --surface-2: #242432;
      --border: #34344a;
      --text: #ece7da;
      --text-dim: #9290a3;
      --accent: #c9a227;
      --accent-soft: rgba(201, 162, 39, 0.16);
      --board-light: #e9dcc0;
      --board-dark: #6b4a33;
      --good: #5fae6b;
      --bad: #c1554a;
      --font-display: 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif;
      --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      background: radial-gradient(circle at 20% -10%, #1f1f30 0%, var(--bg) 55%);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
    }

    .page { max-width: 960px; margin: 0 auto; padding: 32px 20px 56px; }

    header.app-header { text-align: center; margin-bottom: 28px; }
    header.app-header h1 {
      font-family: var(--font-display);
      font-weight: 600; letter-spacing: 0.04em;
      font-size: 2.6rem; margin: 0 0 6px; color: var(--text);
    }
    .rule { width: 64px; height: 2px; background: var(--accent); margin: 0 auto 12px; border-radius: 2px; }
    header.app-header p { margin: 0; color: var(--text-dim); font-size: 0.95rem; letter-spacing: 0.02em; }

    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 480px) minmax(220px, 320px);
      gap: 24px; align-items: start; justify-content: center;
    }
    @media (max-width: 760px) { .layout { grid-template-columns: 1fr; } }

    .board-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px;
      box-shadow: 0 18px 40px -20px rgba(0,0,0,0.6);
    }

    .board-wrap { position: relative; width: 100%; max-width: 460px; margin: 0 auto; }
    #board { width: 100%; }

    #tap-overlay {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      z-index: 5;
    }

    .tap-cell {
      position: relative;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .tap-cell.selected {
      box-shadow: inset 0 0 0 4px var(--accent);
      background: rgba(201, 162, 39, 0.18);
    }

    .tap-cell.legal-target::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 30%; height: 30%;
      background: rgba(201, 162, 39, 0.6);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .tap-cell.legal-target.has-piece::after {
      width: 92%; height: 92%;
      background: transparent;
      box-shadow: inset 0 0 0 4px rgba(201, 162, 39, 0.7);
      border-radius: 6px;
    }

    .white-1e1d7 { background-color: var(--board-light) !important; color: #8a6a3c !important; }
    .black-3c85d { background-color: var(--board-dark)  !important; color: var(--board-light) !important; }
    .board-b72b1 { border: 6px solid #2c2c3a !important; border-radius: 4px; }
    .highlight1-32417, .highlight2-9c5d2 { box-shadow: inset 0 0 0 4px rgba(201,162,39,0.65) !important; }

    .side-panel { display: flex; flex-direction: column; gap: 16px; }
    .panel-block { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; }
    .panel-block h2 { margin: 0 0 10px; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-dim); font-weight: 600; }

    .turn-row { display: flex; align-items: center; gap: 10px; }
    .turn-dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft);
      transition: background 0.25s ease, box-shadow 0.25s ease;
    }
    .turn-dot.black-turn { background: #cfcad8; box-shadow: 0 0 0 4px rgba(207,202,216,0.16); }
    #status-text { font-size: 1rem; font-weight: 500; }
    #status-text.check { color: var(--bad); }
    #status-text.over  { color: var(--accent); }

    .captured-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.85rem; color: var(--text-dim); padding: 6px 0; }
    .captured-row + .captured-row { border-top: 1px solid var(--border); }
    .captured-pieces { font-size: 1.25rem; letter-spacing: 1px; color: var(--text); min-height: 1.4em; }

    #move-list { max-height: 220px; overflow-y: auto; font-size: 0.88rem; line-height: 1.7; color: var(--text); padding-right: 4px; }
    #move-list::-webkit-scrollbar { width: 6px; }
    #move-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .move-row { display: grid; grid-template-columns: 2.2em 1fr 1fr; gap: 6px; }
    .move-row .num { color: var(--text-dim); }
    .empty-hint { color: var(--text-dim); font-size: 0.85rem; }

    .controls { display: flex; gap: 10px; flex-wrap: wrap; }
    button {
      appearance: none; border: 1px solid var(--border);
      background: var(--surface-2); color: var(--text);
      font-family: var(--font-body); font-size: 0.85rem; font-weight: 500;
      padding: 9px 14px; border-radius: 8px; cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.05s;
    }
    button:hover  { border-color: var(--accent); background: #2a2a3a; }
    button:active { transform: translateY(1px); }
    button.primary { border-color: var(--accent); color: #14141c; background: var(--accent); }
    button.primary:hover { background: #d9b13d; }
    button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    footer { text-align: center; margin-top: 36px; color: var(--text-dim); font-size: 0.78rem; }
  </style>
</head>
<body>

<div class="page">
  <header class="app-header">
    <h1>Chess</h1>
    <div class="rule"></div>
    <p>Piece tap karein, phir square tap karein</p>
  </header>

  <div class="layout">
    <div class="board-card">
      <div class="board-wrap">
        <div id="board"></div>
        <div id="tap-overlay"></div>
      </div>
    </div>
    <div class="side-panel">
      <div class="panel-block">
        <h2>Status</h2>
        <div class="turn-row">
          <span class="turn-dot" id="turn-dot"></span>
          <span id="status-text">White to move</span>
        </div>
      </div>
      <div class="panel-block">
        <h2>Captured</h2>
        <div class="captured-row"><span>White ne liye</span><span class="captured-pieces" id="captured-by-white">&mdash;</span></div>
        <div class="captured-row"><span>Black ne liye</span><span class="captured-pieces" id="captured-by-black">&mdash;</span></div>
      </div>
      <div class="panel-block">
        <h2>Moves</h2>
        <div id="move-list"><span class="empty-hint">Abhi koi move nahi</span></div>
      </div>
      <div class="panel-block">
        <h2>Controls</h2>
        <div class="controls">
          <button class="primary" id="btn-new">New Game</button>
          <button id="btn-undo">Undo</button>
          <button id="btn-flip">Flip Board</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<script>
(function () {
  'use strict';
  var game = new Chess();
  var board = null;
  var unicodePieces = {
    wP:'♙', wN:'♘', wB:'♗', wR:'♖', wQ:'♕', wK:'♔',
    bP:'♟', bN:'♞', bB:'♝', bR:'♜', bQ:'♛', bK:'♚'
  };

  var pieceCache = {};
  function pieceTheme(piece) {
    if (pieceCache[piece]) return pieceCache[piece];
    var isWhite = piece[0] === 'w';
    var fill = isWhite ? '#f4ecd8' : '#2a2a38';
    var stroke = isWhite ? '#3a2e1a' : '#f4ecd8';
    var glyph = unicodePieces[piece];
    var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">' +
      '<text x="50" y="80" text-anchor="middle" font-size="82" ' +
      'font-family="Arial" fill="' + fill + '" stroke="' + stroke + '" stroke-width="2.5" paint-order="stroke">' +
      glyph + '</text></svg>';
    var url = 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg);
    pieceCache[piece] = url;
    return url;
  }

  var selectedSquare = null;
  function squareForCell(row, col) {
    var files = ['a','b','c','d','e','f','g','h'];
    return board.orientation() === 'white' ? files[col] + (8 - row) : files[7 - col] + (row + 1);
  }

  function handleTap(square) {
    if (game.game_over()) return;
    var piece = game.get(square);
    if (selectedSquare === null) {
      if (piece && piece.color === game.turn()) {
        selectedSquare = square;
        showHighlights(square);
      }
      return;
    }
    if (square === selectedSquare) {
      clearHighlights();
      selectedSquare = null;
      return;
    }
    if (game.move({ from: selectedSquare, to: square, promotion: 'q' })) {
      board.position(game.fen());
      updateGameUI();
    }
    clearHighlights();
    selectedSquare = null;
  }

  function clearHighlights() {
    document.querySelectorAll('.tap-cell').forEach(function(c){ c.classList.remove('selected','legal-target','has-piece'); });
  }

  function showHighlights(square) {
    clearHighlights();
    var legalMoves = game.moves({ square: square, verbose: true });
    legalMoves.forEach(function(m){
      var cell = document.querySelector('[data-row="'+ (board.orientation()==='white' ? 8-m.to[1] : m.to[1]-1) +'"][data-col="'+ (board.orientation()==='white' ? m.to.charCodeAt(0)-97 : 104-m.to.charCodeAt(0)) +'"]');
      if(cell) { cell.classList.add('legal-target'); if(game.get(m.to)) cell.classList.add('has-piece'); }
    });
    document.querySelector('[data-row="'+ (board.orientation()==='white' ? 8-square[1] : square[1]-1) +'"][data-col="'+ (board.orientation()==='white' ? square.charCodeAt(0)-97 : 104-square.charCodeAt(0)) +'"]').classList.add('selected');
  }

  function updateGameUI() {
    var whiteTurn = game.turn() === 'w';
    document.getElementById('turn-dot').classList.toggle('black-turn', !whiteTurn);
    document.getElementById('status-text').textContent = (game.in_checkmate() ? 'Checkmate!' : (game.in_check() ? 'Check!' : (whiteTurn ? 'White' : 'Black') + ' to move'));
    var hist = game.history();
    document.getElementById('move-list').innerHTML = hist.map(function(m, i){ return i%2===0 ? '<div>'+(i/2+1)+'. '+m : m+'</div>'; }).join('');
  }

  board = Chessboard('board', { position: 'start', draggable: false, pieceTheme: pieceTheme });
  var overlay = document.getElementById('tap-overlay');
  for (var r = 0; r < 8; r++) {
    for (var c = 0; c < 8; c++) {
      var cell = document.createElement('div');
      cell.className = 'tap-cell'; cell.setAttribute('data-row', r); cell.setAttribute('data-col', c);
      cell.addEventListener('click', function() { handleTap(squareForCell(this.dataset.row, this.dataset.col)); });
      overlay.appendChild(cell);
    }
  }
  document.getElementById('btn-new').onclick = function(){ game.reset(); board.start(); updateGameUI(); };
  document.getElementById('btn-undo').onclick = function(){ game.undo(); board.position(game.fen()); updateGameUI(); };
  document.getElementById('btn-flip').onclick = function(){ board.flip(); };
})();
</script>
</body>
</html>
